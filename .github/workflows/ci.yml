name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kidpoints_test
          POSTGRES_USER: kidpoints
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API deps
        working-directory: apps/api
        run: npm ci

      - name: Run unit tests
        working-directory: apps/api
        run: npm test -- --passWithNoTests

      - name: Run E2E tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://kidpoints:password@localhost:5432/kidpoints_test
          JWT_SECRET: ci-test-secret
          NODE_ENV: test
        run: npm run test:e2e -- --passWithNoTests

  test-mobile:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install mobile deps
        working-directory: apps/mobile
        run: npm ci

      - name: Run unit tests
        working-directory: apps/mobile
        run: npx jest --passWithNoTests --ci

  build-api:
    name: Build API (TypeScript check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        working-directory: apps/api
        run: npm ci
      - name: TypeScript check
        working-directory: apps/api
        run: npx tsc --noEmit
