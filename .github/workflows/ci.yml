name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kiddo_test
          POSTGRES_USER: kiddo
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API deps
        run: npm ci

      - name: Run unit tests
        run: ./node_modules/.bin/jest --passWithNoTests

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://kiddo:password@localhost:5432/kiddo_test
          JWT_SECRET: ci-test-secret
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_SECRET: ci-refresh-secret
          JWT_REFRESH_EXPIRES_IN: 30d
          NODE_ENV: test
        run: ./node_modules/.bin/jest --config ./test/jest-e2e.json --passWithNoTests --runInBand

  test-mobile:
    name: Frontend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install mobile deps
        run: npm ci

      - name: Run unit tests
        env:
          NODE_ENV: test
        run: ./node_modules/.bin/jest --passWithNoTests --ci

  build-api:
    name: Build API (TypeScript check)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
