services:
  postgres:
    image: postgres:16-alpine
    container_name: kidpoints_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kidpoints_dev
      POSTGRES_USER: kidpoints
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
